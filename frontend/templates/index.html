<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待完成系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10.36&t=20250122">
</head>
<body>
    <div class="app-container">
        <!-- 主内容区 -->
        <main class="app-main">
            <!-- 顶部功能Tab栏 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="accounting">
                    记一笔
                </button>
                <button class="tab-btn" data-tab="reflections">
                    记事
                </button>
                <button class="tab-btn" data-tab="memos">
                    待完成
                </button>
            </div>

            <!-- 标签页内容 -->
            <div class="tab-contents">
                <!-- 记账标签 -->
                <div class="tab-content active" id="accounting-tab">
                    <div class="tab-content-scrollable">
                        <!-- 统计区：周报 + 月入口 -->
                        <div class="stats-area" id="statsArea">
                            <!-- 周报模块 -->
                            <div class="week-report-section">
                                <!-- 周报header固定不动 -->
                                <div class="section-header">
                                    <!-- 左侧：年份按钮 -->
                                    <div class="section-header-left">
                                        <button class="week-year-btn" id="weekYearBtn" onclick="goToYearlyOverview()">
                                            <span class="week-year" id="weekYear">2026</span>
                                        </button>
                                    </div>
                                    <!-- 中间：时间范围显示 -->
                                    <div class="week-calendar-icon" id="weekCalendarIcon">
                                        <span class="week-date-range" id="weekDateRangeHeader">01月05日－01月11日</span>
                                    </div>
                                    <!-- 右侧：更多菜单按钮 -->
                                    <div class="section-header-right header-more-wrapper">
                                        <button class="more-btn week-more-btn" onclick="toggleWeekMoreMenu()">
                                            <span class="icon">⋯</span>
                                        </button>
                                        <div class="more-menu" id="weekMoreMenu">
                                            <button class="more-menu-item" onclick="exportCurrentTabData()">
                                                <span class="icon">📥</span>
                                                导出数据
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <!-- 可滚动内容区域 -->
                                <div class="week-report-scrollable">
                                    <div class="week-report-cards">
                                        <div class="week-card income">
                                            <div class="week-card-label">本周收入</div>
                                            <div class="week-card-amount" id="weekIncome">+¥0.00</div>
                                        </div>
                                        <div class="week-card expense">
                                            <div class="week-card-label">本周支出</div>
                                            <div class="week-card-amount" id="weekExpense">-¥0.00</div>
                                        </div>
                                        <div class="week-card net">
                                            <div class="week-card-label">本周净额</div>
                                            <div class="week-card-amount" id="weekNet">¥0.00</div>
                                        </div>
                                    </div>

                                    <!-- 月入口模块 -->
                                    <div class="month-entrance-section">
                                        <div class="month-entrance-cards">
                                            <div class="month-entrance-card income" onclick="goToIncomeStats()">
                                                <div class="month-entrance-label">本月收入</div>
                                                <div class="month-entrance-amount" id="monthIncome" style="display: none;">¥0.00</div>
                                                <div class="month-entrance-arrow">›</div>
                                            </div>
                                            <div class="month-entrance-card expense" onclick="goToExpenseStats()">
                                                <div class="month-entrance-label">本月支出</div>
                                                <div class="month-entrance-amount" id="monthExpense" style="display: none;">¥0.00</div>
                                                <div class="month-entrance-arrow">›</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 账单明细列表 -->
                        <div class="items-list" id="recent-records">
                            <!-- 最近记录 -->
                        </div>
                    </div>
                    <!-- 底部固定栏：翻页 + 记一笔 + 分页信息 -->
                    <div class="pagination-container fixed-bottom" id="accounting-pagination">
                        <div class="pagination">
                            <button class="pagination-btn" id="prevWeekBtn" onclick="changeAccountingPage(1)" disabled>
                                <span class="icon">‹</span>
                                上一周
                            </button>
                            <button class="add-record-btn" onclick="window.location.href='/accounting'">
                                记一笔
                            </button>
                            <button class="pagination-btn" id="nextWeekBtn" onclick="changeAccountingPage(-1)">
                                下一周
                                <span class="icon">›</span>
                            </button>
                        </div>
                        <div class="pagination-info">
                            <span class="pagination-current">第 <span id="accounting-current-page">1</span> 页</span>
                            <span class="pagination-divider">/</span>
                            <span class="pagination-total">共 <span id="accounting-total-pages">1</span> 页</span>
                            <span class="pagination-items">（<span id="accounting-total-items">0</span> 条记录）</span>
                        </div>
                    </div>
                </div>

                <!-- 记事标签 -->
                <div class="tab-content" id="reflections-tab">
                    <div class="tab-content-scrollable">
                        <div class="content-header reflections-page-header">
                            <div class="reflections-header-left">
                                <button class="add-btn frequent-btn" onclick="goToReflectionFrequents()" title="反思收藏">
                                    <span class="icon-text">反思收藏</span>
                                </button>
                                <button class="add-btn frequent-btn" onclick="goToCommonFrequents()" title="常用收藏">
                                    <span class="icon-text">常用收藏</span>
                                </button>
                            </div>
                            <div class="reflections-header-right header-more-wrapper">
                                <button class="more-btn reflections-more-btn" onclick="toggleReflectionsMoreMenu()">
                                    <span class="icon">⋯</span>
                                </button>
                                <div class="more-menu" id="reflectionsMoreMenu">
                                    <button class="more-menu-item" onclick="exportCurrentTabData()">
                                        <span class="icon">📥</span>
                                        导出数据
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="items-list" id="reflections-list">
                            <!-- 动态加载内容 -->
                        </div>
                    </div>
                    <!-- 反思分页组件 -->
                    <div class="pagination-container fixed-bottom" id="reflections-pagination">
                        <div class="pagination">
                            <button class="pagination-btn" id="reflections-prev-btn" onclick="changeReflectionsPage(-1)" disabled>
                                <span class="icon">‹</span>
                                上一页
                            </button>
                            <button class="add-btn" onclick="showAddModal('reflection')">
                                添加反思
                            </button>
                            <button class="pagination-btn" id="reflections-next-btn" onclick="changeReflectionsPage(1)">
                                下一页
                                <span class="icon">›</span>
                            </button>
                        </div>
                        <div class="pagination-info">
                            <span class="pagination-current">第 <span id="reflections-current-page">1</span> 页</span>
                            <span class="pagination-divider">/</span>
                            <span class="pagination-total">共 <span id="reflections-total-pages">1</span> 页</span>
                            <span class="pagination-items">（<span id="reflections-total-items">0</span> 条记录）</span>
                        </div>
                    </div>
                </div>

                <!-- 待完成标签 -->
                <div class="tab-content" id="memos-tab">
                    <div class="tab-content-scrollable">
                        <!-- 合并的导航栏：一个大板块，上下排版 -->
                        <div class="memos-nav-bar">
                            <!-- 上方：日期选择器、完成进度和操作按钮 -->
                            <div class="memos-nav-actions">
                                <!-- 日期选择器 -->
                                <button class="date-picker-btn compact" onclick="showDatePicker()" title="选择日期">
                                    <div class="current-date-display" id="memos-current-date">今天</div>
                                </button>
                                <!-- 中间区域：日期提示 + 完成进度 -->
                                <div class="memos-nav-center">
                                    <div class="date-hint" id="memos-date-hint">2026年1月16日</div>
                                    <div class="memos-completion-info" id="memos-completion-info">
                                        今天已完成 0/0
                                    </div>
                                </div>
                                <!-- 右侧：更多菜单 -->
                                <div class="header-more-wrapper">
                                    <button class="more-btn memos-more-btn" onclick="toggleMemosMoreMenu()">
                                        <span class="icon">⋯</span>
                                    </button>
                                    <div class="more-menu" id="memosMoreMenu">
                                        <button class="more-menu-item migrate-btn" onclick="migrateMemosToNextDay()">
                                            <span class="icon">📅</span>
                                            迁移数据
                                        </button>
                                        <button class="more-menu-item" onclick="exportCurrentTabData()">
                                            <span class="icon">📥</span>
                                            导出数据
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="items-list" id="memos-list">
                            <!-- 动态加载内容 -->
                        </div>
                    </div>
                    <!-- 待完成分页组件 -->
                    <div class="pagination-container fixed-bottom" id="memos-pagination">
                        <div class="pagination" id="memos-date-nav">
                            <button class="pagination-btn" id="memos-prev-day-btn" onclick="changeMemosDate(-1)" disabled>
                                <span class="icon">‹</span>
                                上一天
                            </button>
                            <button class="add-btn" onclick="showAddModal('memo')">
                                添加待完成
                            </button>
                            <button class="pagination-btn" id="memos-next-day-btn" onclick="changeMemosDate(1)" disabled>
                                下一天
                                <span class="icon">›</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加新内容</h3>
                <div class="alignment-buttons" id="alignmentButtons" style="display: none; gap: 8px; margin-right: auto; margin-left: 15px;">
                    <button class="alignment-btn" data-align="left" title="左对齐" onclick="setContentAlignment('left')">
                        <span>⬅️</span>
                    </button>
                    <button class="alignment-btn active" data-align="center" title="居中对齐" onclick="setContentAlignment('center')">
                        <span>⬆️</span>
                    </button>
                </div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 反思编辑：标题+内容 -->
                <div id="reflectionEditFields" style="display: none;">
                    <input type="text" id="itemTitle" placeholder="标题" style="width: 100%; padding: 12px 15px; border: 2px solid var(--border-color); border-radius: var(--radius-sm); font-size: 1rem; margin-bottom: 15px; outline: none; transition: var(--transition);">
                    <textarea id="itemContent" placeholder="内容" style="width: 100%; padding: 12px 15px; border: 2px solid var(--border-color); border-radius: var(--radius-sm); font-size: 1rem; min-height: 100px; resize: vertical; outline: none; transition: var(--transition);"></textarea>
                    <p style="margin-top: 10px; font-size: 0.85rem; opacity: 0.7;">创建后可以通过收藏按钮添加到收藏夹</p>
                </div>
                <!-- 待完成编辑：只有内容 -->
                <div id="memoEditFields" style="display: none;">
                    <textarea id="itemMemoContent" placeholder="请输入内容..." style="width: 100%; padding: 12px 15px; border: 2px solid var(--border-color); border-radius: var(--radius-sm); font-size: 1rem; min-height: 120px; resize: vertical; outline: none; transition: var(--transition);"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <div class="checkbox-group" id="memoCheckboxGroup">
                            <label>
                                <input type="checkbox" id="isCompleted">
                                <span>已完成</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveItem()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal" id="deleteModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>确认删除</h3>
            </div>
            <div class="modal-body">
                <p>确定要删除这条记录吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <!-- 导出格式选择模态框 -->
    <div class="modal" id="exportModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>选择导出格式</h3>
                <button class="close-btn" onclick="closeExportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 20px;">请选择要导出的文件格式：</p>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="export-format-btn" onclick="exportData('csv')">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 1.5rem;">📊</span>
                            <div style="text-align: left;">
                                <div style="font-weight: 600; font-size: 1rem;">CSV 文件</div>
                                <div style="font-size: 0.85rem; opacity: 0.7;">适合 Excel 等表格软件打开</div>
                            </div>
                        </div>
                    </button>
                    <button class="export-format-btn" onclick="exportData('sql')">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 1.5rem;">🗄️</span>
                            <div style="text-align: left;">
                                <div style="font-weight: 600; font-size: 1rem;">SQL 文件</div>
                                <div style="font-size: 0.85rem; opacity: 0.7;">包含 INSERT 语句，可用于数据库恢复</div>
                            </div>
                        </div>
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeExportModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 日期选择器模态框 -->
    <div class="modal" id="datePickerModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>选择日期</h3>
                <button class="close-btn" onclick="closeDatePicker()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 15px;">请选择要查看的日期：</p>
                <input type="date" id="memoDatePicker" style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem;">
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeDatePicker()">取消</button>
                <button class="btn btn-primary" onclick="confirmDatePick()">确定</button>
            </div>
        </div>
    </div>

    <!-- 收藏类型选择模态框 -->
    <div class="modal" id="favoriteTypeModal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3>选择收藏类型</h3>
                <button class="close-btn" onclick="closeFavoriteTypeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 15px;">请选择要添加到哪个收藏夹：</p>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="favorite-type-btn" onclick="selectFavoriteType('reflection')">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 1.5rem;">⭐</span>
                            <div style="text-align: left;">
                                <div style="font-weight: 600; font-size: 1rem;">反思收藏</div>
                                <div style="font-size: 0.85rem; opacity: 0.7;">用于收藏反思类内容</div>
                            </div>
                        </div>
                    </button>
                    <button class="favorite-type-btn" onclick="selectFavoriteType('common')">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 1.5rem;">💝</span>
                            <div style="text-align: left;">
                                <div style="font-weight: 600; font-size: 1rem;">常用收藏</div>
                                <div style="font-size: 0.85rem; opacity: 0.7;">用于收藏常用类内容</div>
                            </div>
                        </div>
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeFavoriteTypeModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 迁移数据确认模态框 -->
    <div class="modal" id="migrateModal">
        <div class="modal-content migrate-modal">
            <div class="modal-header">
                <h3>数据迁移</h3>
                <button class="close-btn" onclick="closeMigrateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="migrateModalMessage">是否将未完成任务迁至下一天？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeMigrateModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmMigrate()">确定</button>
            </div>
        </div>
    </div>

    <!-- Loading遮罩 -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="/static/js/app.js?v=8.92"></script>
</body>
</html>
