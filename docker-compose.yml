#version: '3.8'

services:
  db:
    # MySQL 数据库服务
    image: mysql:8.0
    container_name: memo-system-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-memo_system}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3309:3306"  # 宿主机端口:容器端口
    volumes:
      - mysql_data:/var/lib/mysql  # 数据持久化
      - ./database/init:/docker-entrypoint-initdb.d:ro  # 初始化脚本
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - memo-network

  web:
    # FastAPI 应用服务
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memo-system-web
    restart: unless-stopped
    # 不再对外暴露端口，仅通过 Nginx 内部访问
    expose:
      - "8000"
    environment:
      MYSQL_HOST: db  # Docker 网络内使用服务名作为主机名
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-memo_system}
      MYSQL_PORT: 3306
      APP_NAME: ${APP_NAME:-Memo System}
      VERSION: ${VERSION:-1.0.0}
      DEBUG: ${DEBUG:-False}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret}
      ALLOWED_ORIGINS: '["*"]'
      ALLOWED_METHODS: '["*"]'
      ALLOWED_HEADERS: '["*"]'
    volumes:
      - ./frontend/static:/app/frontend/static:ro
      - ./frontend/templates:/app/frontend/templates:ro
    depends_on:
      db:
        condition: service_healthy  # 等待 MySQL 健康检查通过后再启动
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - memo-network

  nginx:
    # Nginx 反向代理服务
    image: nginx:alpine
    container_name: memo-system-nginx
    restart: unless-stopped
    ports:
      - "7361:80"  # 对外统一入口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/static:/app/static:ro
    depends_on:
      - web
    networks:
      - memo-network

volumes:
  mysql_data:
    driver: local

networks:
  memo-network:
    driver: bridge
